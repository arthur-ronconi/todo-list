<div class="bg-blue-100 rounded-lg shadow flex flex-col gap-4 p-8 w-87.5">
  <app-input
    (input)="onInputHandler($event)"
    label="Todo"
    placeholder="What do you have to do?"
  ></app-input>
  <button
    class="w-full h-10 rounded shadow bg-blue-500 text-white font-semibold"
    (click)="submitTodo(text)"
  >
    To do!
  </button>
  @if (store.todos().length) {
    <div class="w-full flex flex-col gap-4 text-blue-900">
      <ul class="w-full flex flex-col gap-2">
        @for (todo of store.todos(); track todo.id) {
          <li class="flex items-center justify-between gap-2 bg-white rounded p-2 w-full">
            <div class="flex items-center gap-2 relative" (click)="store.toggleTodo(todo.id)">
              <input
                type="checkbox"
                [name]="todo.title"
                [id]="todo.id"
                [checked]="todo.completed"
                class="peer appearance-none h-6 w-6 rounded-full border border-blue-500 bg-white checked:bg-blue-500"
              />
              <svg
                class="absolute bottom-1/2 translate-y-1/2 left-0.5 w-5 h-5 text-white hidden peer-checked:block pointer-events-none"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <span [class]="{ 'line-through': todo.completed }">
                {{ todo.title }}
              </span>
            </div>
            <button class="h-6 w-6 text-red-500" (click)="removeTodo(todo.id)">
              <span class="material-symbols-rounded"> close </span>
            </button>
          </li>
        }
      </ul>
    </div>
  }
</div>
